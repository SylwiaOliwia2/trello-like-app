name: PR to stage

on:
  pull_request:
    branches:
      - stage

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.1

  test-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run full regression + E2E + security
        run: make test-stage

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-stage
          path: reports/
          if-no-files-found: warn

      - name: Upload e2e screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-stage
          path: e2e/artifacts/screenshots/
          if-no-files-found: ignore

      - name: Publish JUnit results in PR
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "reports/junit/*.xml"
          check_name: "JUnit report (stage)"
          fail_on_failure: true
          require_tests: true

      - name: Load Allure history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Build Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: reports/allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          subfolder: stage
          keep_reports: 20

      - name: Deploy Allure to GitHub Pages
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Link to Allure report
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          echo "### Allure report (stage)" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/stage/" >> $GITHUB_STEP_SUMMARY
