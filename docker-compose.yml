services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db

  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      TEST_DATABASE_URL: postgresql+psycopg2://app:app@db:5432/appdb_test
    command:
      [
        "sh",
        "-c",
        "python -m pip install --no-cache-dir -r /app/apps/api/requirements.txt && python -m pytest apps/api/tests -q",
      ]
    volumes:
      - .:/app
    depends_on:
      - db
    profiles:
      - test

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"

  e2e-test:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    working_dir: /app
    environment:
      E2E_BASE_URL: http://web:5173
      E2E_API_URL: http://api:8000
      E2E_HEADLESS: "true"
      PYTHONPATH: /app
    command: ["python", "-m", "pytest", "-q", "e2e/tests"]
    volumes:
      - .:/app
    depends_on:
      - web
      - api
    profiles:
      - test

volumes:
  postgres_data:
