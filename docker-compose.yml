services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"

  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "pytest", "apps/api/tests", "-q"]
    profiles:
      - test

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
